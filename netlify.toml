[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/vendors.json"]

[functions."rename"]
  timeout = 26

# Map API routes to Netlify Functions (no frontend changes needed)
[[redirects]]
  from = "/rename"
  to   = "/.netlify/functions/rename"
  status = 200

[[redirects]]
  from = "/api/vendors"
  to   = "/.netlify/functions/vendors"
  status = 200

[[redirects]]
  from = "/api/vendors/*"
  to   = "/.netlify/functions/vendors"
  status = 200

[[redirects]]
  from = "/api/history"
  to   = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/api/stats"
  to   = "/.netlify/functions/stats"
  status = 200
